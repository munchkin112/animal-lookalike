name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare comment storage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          namespace_title="animal-lookalike-comments"
          api_base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          kv_id="$(curl -fsS "${api_base}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            | jq -r --arg title "${namespace_title}" '.result[] | select(.title == $title) | .id' \
            | head -n 1)"

          if [ -z "${kv_id}" ]; then
            kv_id="$(curl -fsS "${api_base}" \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"title\":\"${namespace_title}\"}" \
              | jq -r '.result.id')"
          fi

          cat > wrangler.toml <<EOF
          name = "munchking"
          compatibility_date = "2026-05-27"
          pages_build_output_dir = "dist"

          [[kv_namespaces]]
          binding = "COMMENTS_KV"
          id = "${kv_id}"
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=munchking --branch=main
